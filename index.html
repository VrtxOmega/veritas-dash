<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sovereign Dash | VERITAS Budget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="dark-theme">
    <div class="app-container">
      <header class="top-nav glass-panel">
        <div class="logo">
          <span class="logo-mark">Ω</span>
          <span class="logo-text">Sovereign Dash</span>
        </div>
        <div class="date-display" id="dateDisplay"></div>
      </header>

      <main class="dashboard-grid">
        <!-- Goal Overview Section -->
        <section class="panel glass-panel summary-section">
          <h2>Shift Objective</h2>
          <div class="goals-container">
            <div class="goal-card">
              <h3>Daily Goal</h3>
              <div class="amount" id="dailyGoalDisplay">$0.00</div>
            </div>
            <div class="goal-card">
              <h3>Weekly Goal</h3>
              <div class="amount" id="weeklyGoalDisplay">$0.00</div>
            </div>
          </div>
          <div class="progress-container">
            <div class="progress-info">
              <span>Today's Progress</span>
              <span id="dailyProgressText">0%</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="dailyProgressBar"></div>
            </div>
          </div>
        </section>

        <!-- Current Status Section -->
        <section class="panel glass-panel status-section">
          <h2>Current Status</h2>
          <div class="status-grid">
            <div class="status-item positive">
              <span class="label">Gross Earnings</span>
              <span class="value" id="grossEarnings">$0.00</span>
            </div>
            <div class="status-item negative">
              <span class="label">Shift Expenses (Gas, etc.)</span>
              <span class="value" id="shiftExpenses">$0.00</span>
            </div>
            <div class="status-item negative">
              <span class="label">Allocated Bills</span>
              <span class="value" id="allocatedBills">$0.00</span>
            </div>
            <div class="status-item net">
              <span class="label">Net Profit</span>
              <span class="value" id="netProfit">$0.00</span>
            </div>
            <div class="status-item highlight">
              <span class="label">To Reach Goal</span>
              <span class="value" id="remainingToGoal">$0.00</span>
            </div>
          </div>
        </section>

        <!-- Input Actions Section -->
        <section class="panel glass-panel action-section">
          <h2>Ledger Entry</h2>
          <div class="action-tabs">
            <button class="tab-btn active" data-tab="earnings">Earnings</button>
            <button class="tab-btn" data-tab="expenses">Expenses</button>
            <button class="tab-btn" data-tab="settings">Goals & Bills</button>
          </div>
          
          <div class="tab-content active" id="tab-earnings">
            <form id="earningsForm" class="input-form">
              <div class="input-group">
                <label for="earningAmount">Amount ($)</label>
                <input type="number" id="earningAmount" step="0.01" min="0" required />
              </div>
              <div class="input-group">
                <label for="earningDesc">Description</label>
                <input type="text" id="earningDesc" placeholder="e.g. DoorDash Shift 1" />
              </div>
              <button type="submit" class="btn primary-btn">Log Earning</button>
            </form>
          </div>

          <div class="tab-content" id="tab-expenses">
            <form id="expensesForm" class="input-form">
              <div class="input-group">
                <label for="expenseAmount">Amount ($)</label>
                <input type="number" id="expenseAmount" step="0.01" min="0" required />
              </div>
              <div class="input-group">
                <label for="expenseDesc">Description (Gas, Food)</label>
                <input type="text" id="expenseDesc" placeholder="e.g. Gas" required />
              </div>
              <button type="submit" class="btn danger-btn">Log Expense</button>
            </form>
          </div>

          <div class="tab-content" id="tab-settings">
            <form id="settingsForm" class="input-form">
              <div class="input-group">
                <label for="setDailyGoal">Daily Goal ($)</label>
                <input type="number" id="setDailyGoal" step="0.01" min="0" required />
              </div>
              <div class="input-group">
                <label for="setWeeklyGoal">Weekly Goal ($)</label>
                <input type="number" id="setWeeklyGoal" step="0.01" min="0" required />
              </div>
              <div class="input-group">
                <label for="setDailyBills">Daily Bills Allocation ($)</label>
                <input type="number" id="setDailyBills" step="0.01" min="0" required />
              </div>
              <button type="submit" class="btn secondary-btn">Save Configuration</button>
            </form>
          </div>
        </section>

        <!-- Transaction Log -->
        <section class="panel glass-panel history-section">
          <h2>Shift Log</h2>
          <div class="transaction-list" id="transactionList">
            <!-- Transactions will be injected here -->
            <div class="empty-state">No entries for this shift yet.</div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
